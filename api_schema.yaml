openapi: 3.0.3
info:
  title: Chatlog Analyser API
  description: 聊天记录分析系统的REST API接口
  version: 1.0.0
  contact:
    name: Chatlog Analyser
    url: https://github.com/your-repo/chatlog-analyser

servers:
  - url: http://localhost:5000/api/v1
    description: 本地开发服务器

paths:
  # 代理路由
  /chatlog/{path}:
    get:
      summary: 代理聊天记录GET请求
      description: 将聊天记录相关请求代理到本地服务 (127.0.0.1:5030)
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: 代理路径
      responses:
        '200':
          description: 成功响应
        '503':
          description: 无法连接到聊天记录服务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: 请求超时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: 代理聊天记录POST请求
      description: 将聊天记录相关请求代理到本地服务 (127.0.0.1:5030)
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: 代理路径
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 成功响应
        '503':
          description: 无法连接到聊天记录服务
        '504':
          description: 请求超时

  # 健康检查
  /health:
    get:
      summary: 健康检查
      description: 检查系统健康状态和各服务运行状态
      responses:
        '200':
          description: 系统健康状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # 任务管理
  /tasks:
    post:
      summary: 提交分析任务
      description: 提交新的聊天记录分析任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskSubmissionRequest'
      responses:
        '200':
          description: 任务提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSubmissionResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{task_id}:
    get:
      summary: 获取任务状态
      description: 根据任务ID获取任务执行状态
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: 任务ID
      responses:
        '200':
          description: 任务状态信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatusResponse'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{task_id}/result:
    get:
      summary: 获取任务结果
      description: 获取已完成任务的分析结果
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: 任务ID
      responses:
        '200':
          description: 任务结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResultResponse'
        '400':
          description: 任务尚未完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 任务不存在

  /tasks/{task_id}/cancel:
    post:
      summary: 取消任务
      description: 取消正在执行或等待中的任务
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: 任务ID
      responses:
        '200':
          description: 任务取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCancelResponse'
        '400':
          description: 任务已完成，无法取消
        '404':
          description: 任务不存在

  # 队列和系统状态
  /queue/stats:
    get:
      summary: 获取队列统计信息
      description: 获取任务队列和模型的统计信息
      responses:
        '200':
          description: 队列统计信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueStatsResponse'

  /system/stats:
    get:
      summary: 获取系统统计信息
      description: 获取所有服务的统计信息
      responses:
        '200':
          description: 系统统计信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatsResponse'

  # 分析器管理
  /analyzers:
    get:
      summary: 获取可用分析器列表
      description: 获取系统中所有可用的分析器及其信息
      responses:
        '200':
          description: 分析器列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzersResponse'

  /analyzers/{analyzer_name}:
    get:
      summary: 获取特定分析器信息
      description: 获取指定分析器的详细信息
      parameters:
        - name: analyzer_name
          in: path
          required: true
          schema:
            type: string
          description: 分析器名称
      responses:
        '200':
          description: 分析器信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzerInfoResponse'
        '404':
          description: 分析器不存在

  # 模型管理
  /models/info:
    get:
      summary: 获取模型信息
      description: 获取当前加载的模型信息
      responses:
        '200':
          description: 模型信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfoResponse'

  /models/clear:
    post:
      summary: 清除模型缓存
      description: 清除指定模型或所有模型的缓存
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelClearRequest'
      responses:
        '200':
          description: 清除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelOperationResponse'

  /models/preload:
    post:
      summary: 预加载模型
      description: 预加载指定模型或所有模型
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelPreloadRequest'
      responses:
        '200':
          description: 预加载开始
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelPreloadResponse'
        '400':
          description: 无法预加载模型

  /models/preload/status:
    get:
      summary: 获取预加载状态
      description: 获取模型预加载的状态信息
      parameters:
        - name: model_key
          in: query
          schema:
            type: string
          description: 模型键名（可选）
      responses:
        '200':
          description: 预加载状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreloadStatusResponse'

  /models/preload/cancel:
    post:
      summary: 取消预加载任务
      description: 取消指定模型的预加载任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelPreloadCancelRequest'
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelOperationResponse'
        '400':
          description: 缺少参数或无法取消

components:
  schemas:
    # 错误响应
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: 错误信息
      required:
        - error

    # 健康检查响应
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "healthy"
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          example: "1.0.0"
        services:
          type: object
          properties:
            task_queue:
              type: boolean
            model_manager:
              type: boolean
            preprocessing_service:
              type: boolean
            analysis_service:
              type: boolean
            visualization_service:
              type: boolean
      required:
        - status
        - timestamp
        - version
        - services
